<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Referencia visual de The Sandbox</title>
  <desc id="desc">Composicion generica inspirada en la identidad voxel de The Sandbox.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08172f"/>
      <stop offset="0.5" stop-color="#102a66"/>
      <stop offset="1" stop-color="#06101f"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#5fb6ff" stroke-opacity=".13" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="9" stdDeviation="0" flood-color="#020711" flood-opacity=".9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#1aa7ff" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity=".9"/>
  <g opacity=".22">
    <rect x="73" y="78" width="82" height="82" fill="#41c8ff"/>
    <rect x="163" y="122" width="44" height="44" fill="#8d58ff"/>
    <rect x="1025" y="92" width="92" height="92" fill="#8d58ff"/>
    <rect x="944" y="168" width="42" height="42" fill="#41c8ff"/>
    <rect x="108" y="516" width="60" height="60" fill="#8d58ff"/>
    <rect x="1014" y="500" width="70" height="70" fill="#41c8ff"/>
  </g>
  <g transform="translate(158 176)" filter="url(#shadow)">
    <text x="0" y="40" fill="#ffffff" font-family="Impact, Arial Black, sans-serif" font-size="38" letter-spacing="4">THE</text>
    <text x="0" y="152" fill="#ffffff" font-family="Impact, Arial Black, sans-serif" font-size="142" letter-spacing="7">SANDBOX</text>
    <rect x="860" y="76" width="28" height="28" fill="#2ecbff" transform="rotate(45 874 90)"/>
    <rect x="69" y="176" width="30" height="30" fill="#2ecbff" transform="rotate(45 84 191)"/>
  </g>
  <g transform="translate(360 474)">
    <path d="M0 76 128 0l128 76-128 76Z" fill="#1fb6ff"/>
    <path d="M128 0 256 76v58L128 210Z" fill="#0d6dd1"/>
    <path d="M0 76 128 152v58L0 134Z" fill="#1392e8"/>
    <path d="M324 52 424 0l100 52-100 58Z" fill="#8f5cff"/>
    <path d="M424 0 524 52v46l-100 58Z" fill="#6437d8"/>
    <path d="M324 52 424 110v46L324 98Z" fill="#7747ef"/>
  </g>
  <text x="64" y="620" fill="#9edbff" font-family="Courier New, monospace" font-size="24" letter-spacing="3">VOXEL WORLDS / GAME LOGIC / CREATOR TOOLS</text>
</svg>
